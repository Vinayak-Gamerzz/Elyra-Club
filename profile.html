
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile - Elyra</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Inter',sans-serif;

  color:white;

  overflow-x:hidden;

  background:

  radial-gradient(circle at top left,
  rgba(168,85,247,0.18),
  transparent 30%),

  radial-gradient(circle at bottom right,
  rgba(103,232,249,0.18),
  transparent 30%),

  linear-gradient(
  135deg,
  #0B1020,
  #111827,
  #0F172A
  );

  min-height:100vh;

  padding-top:110px;
}

/* GRID */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

  linear-gradient(
  rgba(255,255,255,0.03) 1px,
  transparent 1px
  ),

  linear-gradient(
  90deg,
  rgba(255,255,255,0.03) 1px,
  transparent 1px
  );

  background-size:40px 40px;

  z-index:-10;
}

/* NAVBAR */

.navbar{

  position:fixed;

  top:0;

  width:100%;

  padding:22px 6%;

  display:flex;

  justify-content:space-between;

  align-items:center;

  background:rgba(10,15,30,0.78);

  backdrop-filter:blur(18px);

  border-bottom:
  1px solid rgba(255,255,255,0.08);

  z-index:9999;
}

.logo-wrap{

  display:flex;

  align-items:center;

  gap:12px;

  text-decoration:none;
}

.logo-img{
  width:34px;
}

.logo-text{

  font-size:24px;

  font-family:'Orbitron';

  background:
  linear-gradient(
  90deg,
  #67E8F9,
  #A78BFA,
  #F472B6
  );

  -webkit-background-clip:text;

  color:transparent;
}

.nav-links{

  display:flex;

  gap:24px;

  align-items:center;

  list-style:none;
}

.nav-links a{

  color:#CBD5E1;

  text-decoration:none;

  transition:0.3s;
}

.nav-links a:hover{
  color:#67E8F9;
}

/* MAIN */

.container{

  width:92%;

  margin:auto;

  display:grid;

  grid-template-columns:
  1fr 2fr;

  gap:30px;
}

/* CARD */

.card{

  background:
  rgba(255,255,255,0.05);

  border:
  1px solid rgba(255,255,255,0.08);

  border-radius:30px;

  padding:30px;

  backdrop-filter:blur(16px);
}

/* LEFT */

.avatar{

  width:130px;

  height:130px;

  border-radius:50%;

  margin:auto;

  display:flex;

  justify-content:center;

  align-items:center;

  font-size:42px;

  font-weight:700;

  background:

  linear-gradient(
  135deg,
  #67E8F9,
  #A78BFA
  );

  color:black;
}

.left h2{

  text-align:center;

  margin-top:20px;

  font-family:'Orbitron';
}

.bio{

  text-align:center;

  margin-top:14px;

  color:#CBD5E1;
}

/* STATS */

.stats{

  margin-top:30px;

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:15px;
}

.stat{

  background:
  rgba(255,255,255,0.05);

  padding:18px;

  border-radius:20px;

  text-align:center;
}

.stat h3{
  font-size:24px;
}

.stat p{

  margin-top:8px;

  color:#CBD5E1;

  font-size:14px;
}

/* FORM */

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:20px;
}

.input-box{

  display:flex;

  flex-direction:column;
}

.input-box label{

  margin-bottom:10px;

  color:#CBD5E1;
}

.input-box input,
.input-box textarea{

  padding:15px;

  border:none;

  outline:none;

  border-radius:16px;

  background:#111827;

  color:white;
}

textarea{
  min-height:120px;
  resize:none;
}

/* SAVE BTN */

.save-btn{

  margin-top:30px;

  width:100%;

  padding:18px;

  border:none;

  border-radius:999px;

  cursor:pointer;

  font-weight:700;

  font-size:16px;

  background:
  linear-gradient(
  90deg,
  #67E8F9,
  #A78BFA
  );

  color:black;

  transition:0.3s;
}

.save-btn:hover{

  transform:translateY(-4px);
}

/* MOBILE */

@media(max-width:900px){

  .container{

    grid-template-columns:1fr;
  }

  .form-grid{

    grid-template-columns:1fr;
  }

}

.hackclub-flag{
  position:fixed;

  top:78px;
  left:0;

  width:170px;

  z-index:999;

  animation:floatFlag 3s ease-in-out infinite;
}

</style>

</head>

<body>

<!--HACK-CLUB-LOGO-->

<a href="https://hackclub.com"
target="_blank">

  <img
  src="assets/images/hackclub-flag.png"
  class="hackclub-flag">

</a>

<!-- NAVBAR -->

<nav class="navbar">

  <a href="index.html"
  class="logo-wrap">

    <img src="assets/images/elyra-logo.png"
    class="logo-img">

    <span class="logo-text">
      ELYRA
    </span>

  </a>

  <ul class="nav-links">

    <li>
      <a href="dashboard.html">
        Dashboard
      </a>
    </li>

    <li>
      <a href="#"
      id="logoutBtn">

        Logout

      </a>
    </li>

  </ul>

</nav>

<!-- MAIN -->

<div class="container">

  <!-- LEFT -->

  <div class="card left">

    <div class="avatar"
    id="avatar">

      E

    </div>

    <h2 id="profileUsername">

      Champ

    </h2>

    <p class="bio"
    id="profileBio">

      Future builder of Elyra 🚀

    </p>

    <!-- STATS -->

    <div class="stats">

      <div class="stat">

        <h3 id="currentCount">
          0
        </h3>

        <p>
          Current
        </p>

      </div>

      <div class="stat">

        <h3 id="pendingCount">
          0
        </h3>

        <p>
          Pending
        </p>

      </div>

      <div class="stat">

        <h3 id="completedCount">
          0
        </h3>

        <p>
          Completed
        </p>

      </div>

      <div class="stat">

        <h3 id="badgeCount">
          0
        </h3>

        <p>
          Badges
        </p>

      </div>

      <div class="stat">

        <h3 id="currentStreak">
          1
        </h3>

        <p>
          Current Streak
        </p>

      </div>

      <div class="stat">

        <h3 id="highestStreak">
          1
        </h3>

        <p>
          Highest Streak
        </p>

      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div class="card">

    <div class="form-grid">

      <div class="input-box">

        <label>
          Username
        </label>

        <input id="username">

      </div>

      <div class="input-box">

        <label>
          Full Name
        </label>

        <input id="name">

      </div>

      <div class="input-box">

        <label>
          Email
        </label>

        <input id="email">

      </div>

      <div class="input-box">

        <label>
          Phone
        </label>

        <input id="phone">

      </div>

      <div class="input-box">

        <label>
          DOB
        </label>

        <input type="date"
        id="dob">

      </div>

      <div class="input-box">

        <label>
          Age
        </label>

        <input id="age">

      </div>

      <div class="input-box">

        <label>
          Favorite Food
        </label>

        <input id="food">

      </div>

      <div class="input-box">

        <label>
          Favorite Skill
        </label>

        <input id="skill">

      </div>

      <div class="input-box">

        <label>
          Favorite Sport
        </label>

        <input id="sport">

      </div>

      <div class="input-box">

        <label>
          Hobby
        </label>

        <input id="hobby">

      </div>

      <div class="input-box"
      style="grid-column:1/3;">

        <label>
          Goals
        </label>

        <textarea id="goal"></textarea>

      </div>

      <div class="input-box"
      style="grid-column:1/3;">

        <label>
          Bio
        </label>

        <textarea id="bio"></textarea>

      </div>

    </div>

    <button class="save-btn"
    id="saveBtn">

      Save Profile 🚀

    </button>

  </div>

</div>

<script type="module"
src="js/profile.js">
</script>

</body>
</html>
